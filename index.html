<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📊 Customer Churn Prediction</h1>
        <p>Predict whether a telecom customer is likely to leave the company.</p>
    </div>

<form action="/predict" method="POST">

<div class="grid">

<div class="form-group">
<label>Gender</label>
<select name="gender" required>
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>
</div>

<div class="form-group">
<label>Senior Citizen</label>
<select name="SeniorCitizen">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="form-group">
<label>Partner</label>
<select name="Partner">
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>
</div>

<div class="form-group">
<label>Dependents</label>
<select name="Dependents">
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>
</div>

<div class="form-group">
<label>Tenure (Months)</label>
<input type="number" name="tenure" min="0" required>
</div>

<div class="form-group">
<label>Phone Service</label>
<select name="PhoneService">
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>
</div>

<div class="form-group">
<label>Multiple Lines</label>
<select name="MultipleLines">
<option value="No">No</option>
<option value="Yes">Yes</option>
<option value="No phone service">No phone service</option>
</select>
</div>

<div class="form-group">
<label>Internet Service</label>
<select name="InternetService">
<option value="DSL">DSL</option>
<option value="Fiber optic">Fiber optic</option>
<option value="No">No</option>
</select>
</div>

<div class="form-group">
<label>Online Security</label>
<select name="OnlineSecurity">
<option value="Yes">Yes</option>
<option value="No">No</option>
<option value="No internet service">No internet service</option>
</select>
</div>

<div class="form-group">
<label>Online Backup</label>
<select name="OnlineBackup">
<option value="Yes">Yes</option>
<option value="No">No</option>
<option value="No internet service">No internet service</option>
</select>
</div>

<div class="form-group">
<label>Device Protection</label>
<select name="DeviceProtection">
<option value="Yes">Yes</option>
<option value="No">No</option>
<option value="No internet service">No internet service</option>
</select>
</div>

<div class="form-group">
<label>Tech Support</label>
<select name="TechSupport">
<option value="Yes">Yes</option>
<option value="No">No</option>
<option value="No internet service">No internet service</option>
</select>
</div>

<div class="form-group">
<label>Streaming TV</label>
<select name="StreamingTV">
<option value="Yes">Yes</option>
<option value="No">No</option>
<option value="No internet service">No internet service</option>
</select>
</div>

<div class="form-group">
<label>Streaming Movies</label>
<select name="StreamingMovies">
<option value="Yes">Yes</option>
<option value="No">No</option>
<option value="No internet service">No internet service</option>
</select>
</div>

<div class="form-group">
<label>Contract</label>
<select name="Contract">
<option value="Month-to-month">Month-to-month</option>
<option value="One year">One year</option>
<option value="Two year">Two year</option>
</select>
</div>

<div class="form-group">
<label>Paperless Billing</label>
<select name="PaperlessBilling">
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>
</div>

<div class="form-group">
<label>Payment Method</label>
<select name="PaymentMethod">
<option value="Electronic check">Electronic check</option>
<option value="Mailed check">Mailed check</option>
<option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
<option value="Credit card (automatic)">Credit card (automatic)</option>
</select>
</div>

<div class="form-group">
<label>Monthly Charges ($)</label>
<input type="number" step="0.01" name="MonthlyCharges" required>
</div>

<div class="form-group">
<label>Total Charges ($)</label>
<input type="number" step="0.01" name="TotalCharges" required>
</div>

</div>

<div class="button-section">
<button type="submit">Predict Customer Churn</button>
</div>

</form>

{% if prediction_text %}

<div class="result">

<h2>{{ prediction_text }}</h2>

<div class="probability">

<div class="card stay">
<h3>No Churn</h3>
<h1>{{ no_churn_prob }}%</h1>
</div>

<div class="card churn">
<h3>Churn</h3>
<h1>{{ churn_prob }}%</h1>
</div>

</div>

</div>

{% endif %}

<footer>

Developed by <strong>Manda Sankeerth</strong><br>

Machine Learning Project • Customer Churn Prediction

</footer>

</div>

</body>

</html>
